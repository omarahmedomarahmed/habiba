name: CI — Build, Lint & Type Check

on:
  push:
    branches: [main, develop, "feat/**", "fix/**"]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: 9.15.4
  NODE_VERSION: 20

jobs:
  # ─────────────────────────────────────────────────────────────────
  # JOB 1: Install & Cache Dependencies
  # ─────────────────────────────────────────────────────────────────
  setup:
    name: Install Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup PNPM
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Get PNPM store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache PNPM store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

  # ─────────────────────────────────────────────────────────────────
  # JOB 2: TypeScript Type Check (all workspaces)
  # ─────────────────────────────────────────────────────────────────
  typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup PNPM
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Restore PNPM cache
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check — shared packages
        run: pnpm --filter "@24therapy/types" run typecheck || pnpm --filter "@24therapy/types" exec tsc --noEmit

      - name: Type check — apps/web
        run: pnpm --filter "web" exec tsc --noEmit
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001

      - name: Type check — apps/therapist
        run: pnpm --filter "therapist" exec tsc --noEmit
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001

      - name: Type check — apps/patient
        run: pnpm --filter "patient" exec tsc --noEmit
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001

      - name: Type check — apps/admin
        run: pnpm --filter "admin" exec tsc --noEmit
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001

      - name: Type check — backend
        run: pnpm --filter "backend" exec tsc --noEmit

  # ─────────────────────────────────────────────────────────────────
  # JOB 3: ESLint (all workspaces)
  # ─────────────────────────────────────────────────────────────────
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup PNPM
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Restore PNPM cache
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint — apps/web
        run: pnpm --filter "web" run lint
        continue-on-error: true

      - name: Lint — apps/therapist
        run: pnpm --filter "therapist" run lint
        continue-on-error: true

      - name: Lint — apps/patient
        run: pnpm --filter "patient" run lint
        continue-on-error: true

      - name: Lint — apps/admin
        run: pnpm --filter "admin" run lint
        continue-on-error: true

      - name: Lint — backend
        run: pnpm --filter "backend" run lint
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────────
  # JOB 4: Build Check (Next.js build compilation)
  # ─────────────────────────────────────────────────────────────────
  build:
    name: Build All Apps
    runs-on: ubuntu-latest
    needs: [typecheck, lint]
    strategy:
      fail-fast: false
      matrix:
        app: [web, therapist, patient, admin]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup PNPM
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Restore PNPM cache
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build ${{ matrix.app }}
        run: pnpm --filter "${{ matrix.app }}" run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001
          NEXT_PUBLIC_WS_URL: ws://localhost:3001
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          # Dummy values to satisfy Next.js build-time env checks
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_dummy
          NEXT_PUBLIC_DAILY_DOMAIN: dummy.daily.co

  # ─────────────────────────────────────────────────────────────────
  # JOB 5: Backend Build + Test
  # ─────────────────────────────────────────────────────────────────
  backend-build:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    needs: setup
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: 24therapy_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup PNPM
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Restore PNPM cache
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build backend
        run: pnpm --filter "backend" run build
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/24therapy_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-jwt-secret-min-32-chars-for-ci
          JWT_REFRESH_SECRET: test-refresh-secret-min-32-chars-here

      - name: Run backend tests
        run: pnpm --filter "backend" run test --passWithNoTests
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/24therapy_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-jwt-secret-min-32-chars-for-ci
          JWT_REFRESH_SECRET: test-refresh-secret-min-32-chars-here
          OPENAI_API_KEY: sk-test-dummy-key-not-real
          STRIPE_SECRET_KEY: sk_test_dummy

  # ─────────────────────────────────────────────────────────────────
  # JOB 6: Security Audit
  # ─────────────────────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup PNPM
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Audit dependencies
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: Check for secrets in code
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────────
  # JOB 7: CI Summary
  # ─────────────────────────────────────────────────────────────────
  ci-success:
    name: CI Passed
    runs-on: ubuntu-latest
    needs: [typecheck, lint, build, backend-build, security]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.typecheck.result }}" == "failure" ]]; then
            echo "TypeScript check failed!"
            exit 1
          fi
          if [[ "${{ needs.build.result }}" == "failure" ]]; then
            echo "Build failed!"
            exit 1
          fi
          if [[ "${{ needs.backend-build.result }}" == "failure" ]]; then
            echo "Backend build/test failed!"
            exit 1
          fi
          echo "All critical CI jobs passed!"

# Reviewed: 2026-06-13 — 24Therapy audit
