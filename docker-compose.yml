version: "3.9"

# =============================================================
# 24Therapy Mental Health OS — Full Stack Docker Compose
# =============================================================
# Usage:
#   Development:  docker-compose up
#   Production:   docker-compose -f docker-compose.yml -f docker-compose.prod.yml up
#   Services only (no apps): docker-compose up postgres redis
#
# Prerequisites:
#   1. Copy backend/.env.example → backend/.env
#   2. Copy apps/web/.env.example → apps/web/.env.local
#   3. Copy apps/therapist/.env.example → apps/therapist/.env.local
#   4. Copy apps/patient/.env.example → apps/patient/.env.local
#   5. Copy apps/admin/.env.example → apps/admin/.env.local
# =============================================================

networks:
  therapy_net:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local

services:
  # ─────────────────────────────────────────────────────────
  # INFRASTRUCTURE SERVICES
  # ─────────────────────────────────────────────────────────

  postgres:
    image: pgvector/pgvector:pg16
    container_name: therapy_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: 24therapy
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d 24therapy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - therapy_net

  redis:
    image: redis:7-alpine
    container_name: therapy_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - therapy_net

  # Optional: Redis UI
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: therapy_redis_ui
    restart: unless-stopped
    profiles: ["debug"]
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - therapy_net

  # ─────────────────────────────────────────────────────────
  # BACKEND (NestJS)
  # ─────────────────────────────────────────────────────────

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: therapy_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/24therapy
      REDIS_URL: redis://redis:6379
      PORT: 3001
    ports:
      - "3001:3001"
      - "9229:9229"  # Node.js debugger
    volumes:
      - ./backend:/app
      - /app/node_modules
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - therapy_net
    command: pnpm run start:dev

  # ─────────────────────────────────────────────────────────
  # FRONTEND APPS (Next.js)
  # ─────────────────────────────────────────────────────────

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: development
    container_name: therapy_web
    restart: unless-stopped
    env_file:
      - ./apps/web/.env.local
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_WS_URL: ws://localhost:3001
    ports:
      - "3004:3000"
    volumes:
      - ./apps/web:/app
      - ./packages:/packages
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - therapy_net
    command: pnpm run dev

  therapist:
    build:
      context: .
      dockerfile: apps/therapist/Dockerfile
      target: development
    container_name: therapy_therapist
    restart: unless-stopped
    env_file:
      - ./apps/therapist/.env.local
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_WS_URL: ws://localhost:3001
    ports:
      - "3000:3000"
    volumes:
      - ./apps/therapist:/app
      - ./packages:/packages
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - therapy_net
    command: pnpm run dev

  patient:
    build:
      context: .
      dockerfile: apps/patient/Dockerfile
      target: development
    container_name: therapy_patient
    restart: unless-stopped
    env_file:
      - ./apps/patient/.env.local
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_WS_URL: ws://localhost:3001
    ports:
      - "3002:3000"
    volumes:
      - ./apps/patient:/app
      - ./packages:/packages
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - therapy_net
    command: pnpm run dev

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      target: development
    container_name: therapy_admin
    restart: unless-stopped
    env_file:
      - ./apps/admin/.env.local
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_WS_URL: ws://localhost:3001
    ports:
      - "3003:3000"
    volumes:
      - ./apps/admin:/app
      - ./packages:/packages
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - therapy_net
    command: pnpm run dev

  # ─────────────────────────────────────────────────────────
  # OPTIONAL DEBUG SERVICES (use --profile debug)
  # ─────────────────────────────────────────────────────────

  # Adminer — PostgreSQL web UI
  adminer:
    image: adminer:latest
    container_name: therapy_adminer
    restart: unless-stopped
    profiles: ["debug"]
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: pepa-linha-dark
    depends_on:
      - postgres
    networks:
      - therapy_net

  # Mailhog — catches outbound emails in dev
  mailhog:
    image: mailhog/mailhog:latest
    container_name: therapy_mailhog
    restart: unless-stopped
    profiles: ["debug"]
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    networks:
      - therapy_net

  # Prometheus (metrics)
  prometheus:
    image: prom/prometheus:latest
    container_name: therapy_prometheus
    restart: unless-stopped
    profiles: ["monitoring"]
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - therapy_net

  # Grafana (dashboards)
  grafana:
    image: grafana/grafana:latest
    container_name: therapy_grafana
    restart: unless-stopped
    profiles: ["monitoring"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3500:3000"
    depends_on:
      - prometheus
    networks:
      - therapy_net

