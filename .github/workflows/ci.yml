name: CI

on:
  push:
    branches: [main, "claude/**", "feat/**", "fix/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: 9.15.4
  NODE_VERSION: "20"

jobs:
  # ─── Install & cache ──────────────────────────────────────────────────────
  setup:
    name: Install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - name: Get pnpm store path
        id: store
        run: echo "path=$(pnpm store path)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        with:
          path: ${{ steps.store.outputs.path }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-
      - run: pnpm install --frozen-lockfile

  # ─── Backend: build + unit tests ─────────────────────────────────────────
  backend:
    name: Backend (build + test)
    runs-on: ubuntu-latest
    needs: setup
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: therapy_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - name: Get pnpm store path
        id: store
        run: echo "path=$(pnpm store path)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        with:
          path: ${{ steps.store.outputs.path }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-
      - run: pnpm install --frozen-lockfile
      - name: Build backend
        run: pnpm --filter @24therapy/api build
        env:
          NODE_ENV: test
      - name: Run backend unit tests
        run: pnpm --filter @24therapy/api test -- --no-coverage --passWithNoTests
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/therapy_test
          JWT_SECRET: ci-jwt-secret-at-least-32-characters-long
          COOKIE_SECRET: ci-cookie-secret-32-characters-here
          OPENAI_API_KEY: sk-test-placeholder-not-real

  # ─── Type check ───────────────────────────────────────────────────────────
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - name: Get pnpm store path
        id: store
        run: echo "path=$(pnpm store path)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        with:
          path: ${{ steps.store.outputs.path }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-
      - run: pnpm install --frozen-lockfile
      - name: Type check — backend
        run: pnpm --filter @24therapy/api type-check
      - name: Type check — web
        run: pnpm --filter web exec tsc --noEmit
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
      - name: Type check — therapist
        run: pnpm --filter therapist exec tsc --noEmit
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
      - name: Type check — patient
        run: pnpm --filter patient exec tsc --noEmit
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
      - name: Type check — admin
        run: pnpm --filter admin exec tsc --noEmit
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1

  # ─── Next.js builds ───────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.app }})
    runs-on: ubuntu-latest
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        app: [web, therapist, patient, admin]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - name: Get pnpm store path
        id: store
        run: echo "path=$(pnpm store path)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        with:
          path: ${{ steps.store.outputs.path }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-
      - run: pnpm install --frozen-lockfile
      - name: Build ${{ matrix.app }}
        run: pnpm --filter ${{ matrix.app }} build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
          NEXT_TELEMETRY_DISABLED: "1"

  # ─── Security audit ───────────────────────────────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - name: Get pnpm store path
        id: store
        run: echo "path=$(pnpm store path)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        with:
          path: ${{ steps.store.outputs.path }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level=high
        continue-on-error: true

  # ─── E2E smoke (component-free, no server needed) ────────────────────────
  e2e-type-check:
    name: E2E Type Check
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - name: Get pnpm store path
        id: store
        run: echo "path=$(pnpm store path)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        with:
          path: ${{ steps.store.outputs.path }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-
      - run: pnpm install --frozen-lockfile
      - name: Type-check e2e tests
        run: npx tsc --noEmit --strict false e2e/**/*.ts playwright.config.ts
        continue-on-error: true

  # ─── Gate ────────────────────────────────────────────────────────────────
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [backend, typecheck, build, audit, e2e-type-check]
    if: always()
    steps:
      - name: Check required jobs
        run: |
          echo "backend: ${{ needs.backend.result }}"
          echo "typecheck: ${{ needs.typecheck.result }}"
          echo "build: ${{ needs.build.result }}"
          if [[ "${{ needs.backend.result }}" == "failure" ||
                "${{ needs.typecheck.result }}" == "failure" ||
                "${{ needs.build.result }}" == "failure" ]]; then
            echo "One or more required jobs failed."
            exit 1
          fi
          echo "All required CI jobs passed."
