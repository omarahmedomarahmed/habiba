name: CI — 24Therapy Platform

on:
  push:
    branches: [main, develop, genspark_ai_developer]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20.x'
  PNPM_VERSION: '9'

jobs:
  # ============================================================
  # Lint & Type Check
  # ============================================================
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check — Therapist Portal
        run: pnpm --filter @24therapy/therapist exec tsc --noEmit
        continue-on-error: true

      - name: Type check — Patient Portal
        run: pnpm --filter @24therapy/patient exec tsc --noEmit
        continue-on-error: true

      - name: Type check — Admin Portal
        run: pnpm --filter @24therapy/admin exec tsc --noEmit
        continue-on-error: true

      - name: Type check — Backend
        run: pnpm --filter @24therapy/backend exec tsc --noEmit
        continue-on-error: true

  # ============================================================
  # Build All Apps
  # ============================================================
  build-frontends:
    name: Build Frontend Apps
    runs-on: ubuntu-latest
    needs: lint-typecheck
    strategy:
      fail-fast: false
      matrix:
        app:
          - name: therapist
            filter: '@24therapy/therapist'
            env_url: https://app.24therapy.com
          - name: patient
            filter: '@24therapy/patient'
            env_url: https://my.24therapy.com
          - name: admin
            filter: '@24therapy/admin'
            env_url: https://admin.24therapy.com
          - name: web
            filter: '@24therapy/web'
            env_url: https://24therapy.com

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create .env for ${{ matrix.app.name }}
        working-directory: apps/${{ matrix.app.name }}
        run: |
          cp .env.example .env.local
          echo "NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL || 'https://api.24therapy.com' }}" >> .env.local
          echo "NEXT_PUBLIC_APP_ENV=production" >> .env.local

      - name: Build ${{ matrix.app.name }}
        run: pnpm --filter ${{ matrix.app.filter }} build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'https://api.24therapy.com' }}
          NEXT_PUBLIC_APP_ENV: production

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.app.name }}
          path: apps/${{ matrix.app.name }}/.next
          retention-days: 7

  # ============================================================
  # Build Backend
  # ============================================================
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build backend
        run: pnpm --filter @24therapy/backend build
        continue-on-error: true

  # ============================================================
  # Security Scan
  # ============================================================
  security-scan:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --severity high
        continue-on-error: true

  # ============================================================
  # Deploy to Vercel (on main branch push)
  # ============================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-frontends, build-backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://24therapy.com
    steps:
      - uses: actions/checkout@v4

      - name: Deploy notification
        run: |
          echo "✅ CI passed for commit ${{ github.sha }}"
          echo "Deployment would be triggered here via Vercel webhook or CLI"
          echo "Apps: therapist, patient, admin, web"
          echo "Backend: Railway/Render/AWS deployment"
